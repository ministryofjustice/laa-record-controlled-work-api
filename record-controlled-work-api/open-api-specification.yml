openapi: "3.0.0"
info:
  version: 1.0.0
  title: Record Controlled Work API
paths:
  /api/v1/applications:
    get:
      tags:
        - applications
      summary: Get all applications
      operationId: getApplications
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Applications"
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '500':
          description: 'Internal server error'
    post:
      tags:
        - applications
      summary: Create an application
      operationId: createApplication
      requestBody:
        description: create an application
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequestBody'
      responses:
        '200':
          description: 'Created'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponseBody"
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
  /api/v1/items:
    get:
      tags:
        - items
      summary: Get items
      operationId: getItems
      responses:
        '200':
          description: 'Success'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Items"
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
    post:
      tags:
        - items
      summary: Create an item
      operationId: createItem
      requestBody:
        description: create an item
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemRequestBody'
      responses:
        '201':
          description: 'Created'
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'

  /api/v1/items/{id}:
    get:
      summary: Get item by id
      operationId: getItemById
      tags:
        - items
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the item to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
    put:
      tags:
        - items
      summary: Update an item
      operationId: updateItem
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the item to be updated
          schema:
            type: integer
            format: int64
      requestBody:
        description: update an existing item
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemRequestBody'
      responses:
        '204':
          description: No content
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'
    delete:
      summary: Delete item by id
      operationId: deleteItem
      tags:
        - items
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the item to be deleted
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No content
        '400':
          description: 'Bad request'
        '401':
          description: 'Unauthorized'
        '403':
          description: 'Forbidden'
        '404':
          description: 'Not found'
        '500':
          description: 'Internal server error'

components:
  schemas:
    Application:
      required:
        - id
        - name
        - applicationRefNumber
        - modifiedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        applicationRefNumber:
          type: string
        modifiedAt:
          type: string
          format: date-time

    CreateApplicationRequestBody:
      required:
        - ecf
        - legalAidBefore
        - fullName
        - dateOfBirth
        - hasNINumber
        - haveAHomeAddress
        - addressLine1
        - country
      properties:
        ecf:
          type: string
        legalAidBefore:
          type: string
        legalAidLast6Months:
          type: string
        reasonForYes:
          type: string
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        hasNINumber:
          type: string
        niNumber:
          type: string
        haveAHomeAddress:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        addressLine3:
          type: string
        addressLine4:
          type: string
        townOrCity:
          type: string
        county:
          type: string
        postcode:
          type: string
        country:
          type: string

    CreateApplicationResponseBody:
      properties:
        id:
          type: string
          format: uuid
        ecf:
          type: string
        legalAidBefore:
          type: string
        legalAidLast6Months:
          type: string
        reasonForYes:
          type: string
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        hasNINumber:
          type: string
        niNumber:
          type: string
        haveAHomeAddress:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        addressLine3:
          type: string
        addressLine4:
          type: string
        townOrCity:
          type: string
        county:
          type: string
        postcode:
          type: string
        country:
          type: string

    Applications:
      type: array
      items:
        $ref: "#/components/schemas/Application"

    Item:
      required:
        - id
        - name
        - description
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
    ItemRequestBody:
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string

    Items:
      type: array
      items:
        $ref: "#/components/schemas/Item"