services:
  rcw-api:
    container_name: rcw-api
    build:
      context: .
      secrets:
        - git_token
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "8181:8181"
      - "5005:5005"
    depends_on:
      - mock-oauth2-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LAA_OAUTH2_ISSUER_URI=http://host.docker.internal:9090/default
      - LAA_OAUTH2_AUDIENCE=default
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    container_name: mock-oauth2-server
    ports:
      - "9090:9090"
    environment:
      - SERVER_PORT=9090
      - JSON_CONFIG_PATH=/etc/mock-oauth2-config.json
    volumes:
      - ./mock-oauth2-config.json:/etc/mock-oauth2-config.json

secrets:
  git_token:
    environment: GITHUB_TOKEN
